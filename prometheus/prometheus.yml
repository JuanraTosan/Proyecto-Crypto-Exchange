global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spark-master'
    metrics_path: '/metrics/master/prometheus'
    static_configs:
      - targets: ['crypto_spark_master:8080']

  - job_name: 'spark-worker'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['crypto_spark_worker:8081']
  
  - job_name: 'crypto-negocio'
    static_configs:
      - targets: ['crypto_spark_master:8000']