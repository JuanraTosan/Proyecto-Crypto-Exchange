services:
  # --- BUS DE EVENTOS ---
  kafka:
    image: apache/kafka:latest
    container_name: crypto_kafka
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - crypto_network

  # --- ALMACENAMIENTO (HDFS) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: crypto_namenode
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      - ENS_CLUSTER_NAME=crypto_cluster
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
    networks:
      - crypto_network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: crypto_datanode
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=crypto_namenode:9870
    env_file:
      - ./hadoop.env
    networks:
      - crypto_network

  # --- PROCESAMIENTO (SPARK) ---
  spark-master:
    image: bde2020/spark-master:3.0.1-hadoop3.2
    container_name: crypto_spark_master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "8000:8000"
    volumes:
      - ./spark/metrics.properties:/spark/conf/metrics.properties
    networks:
      - crypto_network

  spark-worker:
    image: bde2020/spark-worker:3.0.1-hadoop3.2
    container_name: crypto_spark_worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8082:8081"
    volumes:
      - ./spark/metrics.properties:/spark/conf/metrics.properties
    networks:
      - crypto_network

  # --- VISUALIZACIÓN ---
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - crypto_network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - crypto_network

networks:
  crypto_network:
    driver: bridge

volumes:
  namenode_data:
  datanode_data: